<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Paradis Property Maintenance | Peterborough, Ontario</title>

<meta name="description"
content="Grass cutting, clean ups, snow removal, and free scrap metal pick up in Peterborough. Call, text, or email for a quote." />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f6f3;
  --white:#fff;
  --charcoal:#171717;
  --muted:#6f6f6f;
  --line-soft:rgba(0,0,0,0.06);
  --red:#c51627;
  --red-deep:#8d101b;
  --radius:28px;
  --max:1600px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--charcoal);
}

.container{
  width:min(calc(100% - 24px), var(--max));
  margin:auto;
}

/* LOGO FIX */
.logo-banner{
  background:#fff;
  border-bottom:1px solid var(--line-soft);
  padding:16px 24px;
  display:flex;
  justify-content:center;
}

.logo-banner img{
  width:auto;
  max-width:min(100%,1100px);
  height:120px;
  object-fit:contain;
}

/* HEADER */
.site-header{
  position:sticky;
  top:0;
  background:#f7f6f3e8;
  backdrop-filter:blur(10px);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
}

.btn{
  padding:14px 20px;
  border-radius:999px;
  font-weight:800;
  border:none;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(135deg,var(--red),var(--red-deep));
  color:#fff;
}

.btn-secondary{
  background:#fff;
  border:1px solid #ddd;
}

/* HERO */
.hero-shell{
  position:relative;
  height:560px;
  border-radius:var(--radius);
  overflow:hidden;
}

.hero-shell img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-content{
  position:absolute;
  bottom:20px;
  left:20px;
}

.hero-panel{
  background:#ffffffdd;
  padding:20px;
  border-radius:20px;
  max-width:600px;
}

.hero-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

/* STICKY BAR */
.sticky-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#f7f6f3f0;
  padding:10px;
  display:flex;
  gap:10px;
}

.sticky-bar .btn{
  flex:1;
}

/* MOBILE */
@media(max-width:720px){
.logo-banner img{height:90px}
.hero-actions{flex-direction:column}
}

@media(max-width:480px){
.logo-banner img{height:72px}
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-banner">
  <img src="images/logo.jpg">
</div>

<!-- HEADER -->
<header class="site-header">
  <div class="container nav">
    <strong>Paradis Property Maintenance</strong>
    <a class="btn btn-primary" href="tel:17057724204">Call Now</a>
  </div>
</header>

<!-- HERO -->
<section class="container">
  <div class="hero-shell">
    <img src="images/hero.jpg">

    <div class="hero-content">
      <div class="hero-panel">
        <h1>Grass Cutting, Clean Ups & Snow Removal</h1>
        <p>Reliable outdoor services in Peterborough.</p>

        <div class="hero-actions">
          <a class="btn btn-primary" href="tel:17057724204">Call</a>
          <a class="btn btn-secondary" href="sms:17057724204">Text</a>
          <a class="btn btn-secondary" href="mailto:paradispropertymaintenance@gmail.com">Email</a>
        </div>

      </div>
    </div>

  </div>
</section>

<!-- STICKY BAR -->
<div class="sticky-bar">
  <a class="btn btn-primary" href="tel:17057724204">Call</a>
  <a class="btn btn-secondary" href="sms:17057724204">Text</a>
  <a class="btn btn-secondary" href="mailto:paradispropertymaintenance@gmail.com">Email</a>
</div>

</body>
</html>
